services:
  - type: web
    name: vqa-api
    runtime: python
    buildCommand: pip install -r requirements_api.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false          # you set this manually in the Render dashboard
      - key: HF_MODEL
        value: Salesforce/blip-vqa-base
    healthCheckPath: /health
    autoDeploy: true
